name: Create Labels

on:
  workflow_dispatch:

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Create labels
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx auto create-labels
